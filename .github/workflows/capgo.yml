name: Deploy OTA Update

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Auto-bump version
        run: npm version 0.0.${{ github.run_number }} --no-git-tag-version

      - name: Capgo Upload
        run: npx @capgo/cli@latest bundle upload -a e375d60d-7be4-4da7-bec1-0b2f4562a53f -c production
