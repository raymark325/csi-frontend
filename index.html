<!doctype html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="description" content="<%= productDescription %>">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: gap: content: blob:; script-src * 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src * 'self' 'unsafe-inline'; connect-src * 'self' ws: wss:;"
    />

    <link rel="icon" type="image/png" sizes="128x128" href="icons/favicon-128x128.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="icon" type="image/ico" href="favicon.ico">
  </head>
  <body>
    <!-- Splash Screen (removed by App.vue when ready) -->
    <div id="splash-screen">
      <div class="splash-content">
        <img src="maharlika-logo.png" alt="Maharlika Logo" class="splash-logo elegant" />
        <h2 class="splash-title">
          <span class="text-white">maharlika</span><br>
          <span class="text-yellow">technology</span>
        </h2>
        <div class="splash-loading-bar-container">
          <div class="splash-loading-bar"></div>
        </div>
      </div>
    </div>
    <style>
      #splash-screen {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: #102E60; /* Matches Maharlika Logo Background */
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
      }
      #splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .splash-content {
        text-align: center;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .splash-logo {
        width: 220px;
        height: auto;
        margin-bottom: 24px;
      }
      .elegant {
        animation: 
          elegantFadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards,
          elegantFloat 4s ease-in-out 1.2s infinite;
      }
      @keyframes elegantFadeInUp {
        0% { opacity: 0; transform: translateY(20px) scale(0.95); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes elegantFloat {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-8px) scale(1.02); }
      }
      .splash-title {
        font-family: 'Horizon', sans-serif;
        font-size: 18px; 
        font-weight: 800; 
        margin: 0 0 32px; 
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: elegantFadeInUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        line-height: 1.4;
      }
      .text-white { color: #ffffff; }
      .text-yellow { color: #facc15; }
      .splash-loading-bar-container {
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
        animation: elegantFadeInUp 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      .splash-loading-bar {
        width: 0%;
        height: 100%;
        background: #facc15; /* Matching yellow/gold */
        border-radius: 4px;
        animation: loadBar 3.5s ease-in-out forwards;
      }
      @keyframes loadBar {
        0% { width: 0%; }
        20% { width: 10%; }
        50% { width: 60%; }
        80% { width: 80%; }
        100% { width: 100%; }
      }

      /* Hide splash screen on desktop/tablets (screens larger than 768px) */
      @media (min-width: 769px) {
        #splash-screen {
          display: none !important;
        }
      }
    </style>

    <!-- quasar:entry-point -->
  </body>
</html>
